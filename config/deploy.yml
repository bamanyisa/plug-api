service: plug-api
image: ghcr.io/bamanyisa/plug-api

servers:
  web:
    hosts:
      - 57.131.34.157
    options:
      network: plug
  job:
    hosts:
      - 57.131.34.157
    cmd: bundle exec sidekiq
    options:
      network: plug

proxy: false

registry:
  server: ghcr.io
  username: bamanyisa
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: ubuntu
  keys:
    - ~/.ssh/vps_ea6e6e62_key

builder:
  arch: amd64

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: true
    RAILS_SERVE_STATIC_FILES: true
    PORT: "3001"
    ALLOWED_ORIGINS: "https://app.plug.ug,https://plug.ug"
    FINERACT_BASE_URL: "http://plug-api-fineract:8080"
  secret:
    - RAILS_MASTER_KEY
    - DATABASE_URL
    - REDIS_URL
    - DOORKEEPER_JWT_SECRET

accessories:
  db:
    image: postgres:16-alpine
    host: 57.131.34.157
    port: 5432
    env:
      clear:
        POSTGRES_USER: postgres
        POSTGRES_DB: postgres
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - plug_api_postgres:/var/lib/postgresql/data
    options:
      network: plug

  fineract:
    image: openmf/fineract:1.11.0
    host: 57.131.34.157
    port: 8081
    env:
      clear:
        FINERACT_SERVER_PORT: "8080"
        FINERACT_SERVER_SSL_ENABLED: "false"
        JAVA_TOOL_OPTIONS: "-Xmx768m -Xms256m"
        FINERACT_HIKARI_DRIVER_SOURCE_CLASS_NAME: org.postgresql.Driver
        FINERACT_HIKARI_JDBC_URL: jdbc:postgresql://plug-api-db:5432/fineract_tenants
        FINERACT_HIKARI_USERNAME: postgres
        FINERACT_HIKARI_TENANT_DRIVER_SOURCE_CLASS_NAME: org.postgresql.Driver
        FINERACT_HIKARI_TENANT_JDBC_URL: jdbc:postgresql://plug-api-db:5432/fineract_tenants
        FINERACT_HIKARI_TENANT_USERNAME: postgres
        FINERACT_DEFAULT_TENANTDB_IDENTIFIER: default
        FINERACT_DEFAULT_TENANTDB_NAME: fineract_default
        FINERACT_DEFAULT_TENANTDB_DESCRIPTION: Default Tenant
        FINERACT_DEFAULT_TENANTDB_TIMEZONE: Africa/Kampala
        FINERACT_DEFAULT_TENANTDB_HOSTNAME: plug-api-db
        FINERACT_DEFAULT_TENANTDB_PORT: "5432"
        FINERACT_DEFAULT_TENANTDB_UID: postgres
        FINERACT_SECURITY_BASICAUTH_ENABLED: "false"
        FINERACT_SECURITY_2FA_ENABLED: "false"
        FINERACT_SECURITY_OAUTH_ENABLED: "true"
        FINERACT_SERVER_OAUTH_RESOURCE_URL: "https://api.plug.ug"
      secret:
        - POSTGRES_PASSWORD
        - FINERACT_DB_PASSWORD  # same value as POSTGRES_PASSWORD, used for HIKARI + tenant pwd
    options:
      network: plug

  redis:
    image: redis:7-alpine
    host: 57.131.34.157
    port: 6379
    volumes:
      - plug_api_redis:/data
    options:
      network: plug

  cloudflared:
    image: cloudflare/cloudflared:latest
    host: 57.131.34.157
    cmd: tunnel --no-autoupdate run
    env:
      secret:
        - TUNNEL_TOKEN
    options:
      network: plug

healthcheck:
  path: /health
  port: 3001
  max_attempts: 10
  interval: 5s
